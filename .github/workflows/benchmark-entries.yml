name: benchmark-entries
# G5 researcher-push: entries are ADMITTED BY MACHINES. An entry PR (touching
# entries/) is grounded-validated, then SYNCED WITH main and merged by the bot.
#
# Concurrency & the derived registry (hardened 2026-07-11). registry/benchmarks.json
# is a DERIVED file rebuilt from entries/. Two entry PRs published close together
# used to collide on it: each folded a registry built from a STALE main, so the
# second PR ended up CONFLICTING and its merge step gave up, leaving the entry
# stuck (e.g. #21, the llama det run — #20 merged ~1 min earlier).
#
# Fix — self-healing merge: FOLD ONCE (merge origin/main into the entry branch +
# regenerate the registry, which resolves the derived-file conflict and re-runs
# grounded admission), then merge. If a sibling entry lands mid-run the merge
# fails and the loop RE-SYNCS with the new main and retries — optimistic
# concurrency, so a burst of entries serializes itself cleanly.
#
# CRITICAL: only re-push when main ACTUALLY advanced (an `is-ancestor` check).
# The registry gets a fresh `updated_at` on every rebuild, so re-folding every
# loop iteration would push a new commit each time and perpetually reset GitHub's
# mergeability recompute — the merge would never land (this stalled #22 through
# all 8 attempts on 2026-07-11 before this guard was added). When the merge just
# needs the recompute to settle, we WAIT without re-pushing.
#
# Why fold on the branch (not a rebuild-only-on-main job): a GITHUB_TOKEN merge
# fires NO push event, so a `push: main` rebuild would never run for a bot-merged
# entry; folding the refreshed registry into the merge keeps the entry visible
# the instant it lands.
on:
  pull_request:
    paths: ["entries/**"]
  schedule:
    - cron: "*/15 * * * *"   # backstop only (heavily throttled); the inline path is authoritative
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["entries/**", "scripts/validate_and_build_registry.py"]

concurrency:
  # Per-PR groups let different entry PRs run concurrently (the loop makes them
  # safe), while a PR's own re-runs queue instead of racing. All non-PR events
  # share "main-write" so registry writes to main never run concurrently.
  group: benchmark-entries-${{ github.event.pull_request.number || 'main-write' }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + the entry BRANCH (not the detached merge ref): the job
          # merges origin/main into it and commits the rebuilt registry back.
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install --quiet auspexai-tenant
      - name: Grounded admission check (fast fail on an inadmissible entry)
        run: python scripts/validate_and_build_registry.py
      - name: Guard — a researcher PR may only touch entries/ (+ the derived registry)
        if: github.event_name == 'pull_request'
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          # The researcher's PR may only add/modify files under entries/. The bot's
          # own registry/benchmarks.json is allowed — it is regenerated
          # deterministically from the admitted entries, so a hand-crafted registry
          # can never survive into main.
          CHANGED=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --json files --jq '.files[].path')
          echo "$CHANGED"
          if echo "$CHANGED" | grep -vE '^entries/|^registry/benchmarks\.json$'; then
            echo "::error::entry PRs may only add/modify files under entries/"; exit 1
          fi
      - name: Sync with main, fold the registry, and merge (self-healing under concurrent entries)
        if: github.event_name == 'pull_request'
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          git config user.name "benchmark-registry-bot"
          git config user.email "noreply@auspexai.network"
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          BR="${{ github.head_ref }}"

          # Merge current main into the entry branch + regenerate the DERIVED
          # registry (resolves the registry conflict + re-validates the merged
          # entry set), then push. Called once up front, and again only when a
          # sibling entry has actually advanced main.
          sync_fold_push() {
            git merge --no-commit --no-edit origin/main || true
            python scripts/validate_and_build_registry.py
            git add -A
            git diff --cached --quiet || git commit -q -m "registry: sync with main + fold admitted entry [skip ci]"
            git push --quiet origin "HEAD:$BR"
          }

          git fetch --quiet origin main
          sync_fold_push
          sleep 6   # let GitHub compute mergeability after the fold-push

          for attempt in $(seq 1 8); do
            if [ "$(gh pr view "$PR" --repo "$REPO" --json state --jq .state)" = "MERGED" ]; then
              echo "already merged"; exit 0
            fi
            if gh pr merge "$PR" --repo "$REPO" --squash --delete-branch=false; then
              echo "merged on attempt $attempt"; exit 0
            fi
            # Merge failed. Re-sync ONLY if a sibling entry advanced main; a fresh
            # registry timestamp on every loop would otherwise reset GitHub's
            # mergeability recompute forever and the merge would never land.
            git fetch --quiet origin main
            if git merge-base --is-ancestor origin/main HEAD; then
              echo "mergeability still recomputing (attempt $attempt/8) — waiting, not re-pushing"
            else
              echo "a sibling entry advanced main (attempt $attempt/8) — re-syncing"
              sync_fold_push
            fi
            sleep 8
          done
          echo "::error::entry PR could not be merged after 8 attempts — surfacing instead of leaving it silently open"; exit 1
      - name: Commit the rebuilt registry (backstop — schedule / dispatch / push)
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "benchmark-registry-bot"
          git config user.email "noreply@auspexai.network"
          git add registry/benchmarks.json
          git diff --cached --quiet || git commit -m "registry: rebuild from admitted entries [skip ci]"
          git push
